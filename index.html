<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMaC Medical Education Platform - Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body { font-family: 'Lato', sans-serif; background: #f9f8f5; color: #1a1a1a; }
        nav { background: #0d1b2a; padding: 0 40px; display: flex; align-items: center; height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: #c9a227; letter-spacing: 2px; margin-right: auto; cursor: pointer; }
        nav a { color: #e8d7b8; text-decoration: none; padding: 0 20px; height: 60px; display: flex; align-items: center; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; border-bottom: 3px solid transparent; transition: all 0.3s ease; cursor: pointer; }
        nav a:hover, nav a.active { color: #c9a227; border-bottom: 3px solid #c9a227; }
        .page { display: none; }
        .page.active { display: block; }
        .home { background: linear-gradient(135deg, #0d1b2a 0%, #1a2e42 100%); min-height: 100vh; padding: 60px 40px; text-align: center; color: white; }
        .home h1 { font-family: 'Playfair Display', serif; font-size: 48px; margin-bottom: 15px; color: #c9a227; }
        .home p { font-size: 18px; color: #d9c8a8; margin-bottom: 40px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; max-width: 800px; margin: 40px auto; }
        .stat { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 4px; }
        .stat-num { font-size: 32px; color: #c9a227; font-weight: bold; }
        .stat-label { font-size: 12px; color: #d9c8a8; text-transform: uppercase; margin-top: 8px; }
        .content-page { background: #f9f8f5; min-height: calc(100vh - 60px); padding: 40px; }
        .page-header { text-align: center; margin-bottom: 30px; }
        .page-header h1 { font-family: 'Playfair Display', serif; font-size: 36px; color: #0d1b2a; margin-bottom: 8px; }
        .page-header p { color: #666; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
        .filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; align-items: flex-start; }
        .filter-label { font-size: 10px; color: #c9a227; font-weight: 700; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
        select { padding: 8px 12px; border: 1px solid #ddd; background: white; color: #333; font-family: 'Lato', sans-serif; font-size: 12px; border-radius: 2px; cursor: pointer; min-width: 150px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card { background: white; border: 1px solid #e0dcd2; padding: 20px; border-radius: 2px; transition: all 0.3s ease; box-shadow: 0 1px 4px rgba(0,0,0,0.08); cursor: pointer; }
        .card:hover { border-color: #c9a227; box-shadow: 0 6px 15px rgba(0,0,0,0.12); transform: translateY(-2px); }
        .card-num { font-family: 'Playfair Display', serif; font-size: 14px; color: #c9a227; margin-bottom: 8px; font-weight: 700; }
        .card-title { font-family: 'Playfair Display', serif; font-size: 18px; color: #0d1b2a; margin-bottom: 8px; }
        .card-desc { font-size: 12px; color: #666; line-height: 1.5; }
        .station { background: white; border: 1px solid #e0dcd2; padding: 18px; border-radius: 2px; border-left: 4px solid #c9a227; transition: all 0.3s ease; box-shadow: 0 1px 4px rgba(0,0,0,0.08); cursor: pointer; }
        .station:hover { box-shadow: 0 6px 15px rgba(0,0,0,0.12); transform: translateY(-2px); }
        .station-num { font-size: 10px; color: #c9a227; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .station-title { font-family: 'Playfair Display', serif; font-size: 16px; color: #0d1b2a; margin-bottom: 8px; }
        .station-desc { font-size: 11px; color: #666; line-height: 1.5; margin-bottom: 10px; }
        .risk-badge { display: inline-block; padding: 4px 8px; font-size: 9px; font-weight: 700; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.4px; color: white; }
        .risk-instant { background: #d32f2f; }
        .risk-high { background: #f57c00; }
        .risk-time { background: #c62828; }
        .risk-decision { background: #c9a227; color: #0d1b2a; }
    </style>
</head>
<body>
    <nav>
        <div class="logo" onclick="goHome()">AMaC</div>
        <a onclick="goCards()" class="nav-link active">Master Cards (120+)</a>
        <a onclick="goStations()" class="nav-link">OSCE Stations (50+)</a>
    </nav>
    
    <div id="home" class="page active home">
        <h1>AMaC Medical Education Platform</h1>
        <p>Complete PLAB 2 & OSCE Preparation</p>
        <div class="stats">
            <div class="stat">
                <div class="stat-num">120+</div>
                <div class="stat-label">Master Cards</div>
            </div>
            <div class="stat">
                <div class="stat-num">50+</div>
                <div class="stat-label">OSCE Stations</div>
            </div>
            <div class="stat">
                <div class="stat-num">6</div>
                <div class="stat-label">Chapter Types</div>
            </div>
            <div class="stat">
                <div class="stat-num">∞</div>
                <div class="stat-label">Learning Value</div>
            </div>
        </div>
    </div>
    
    <div id="master-cards" class="page content-page">
        <div class="page-header">
            <h1>Master Cards</h1>
            <p>120+ Interactive Clinical Chapters</p>
        </div>
        <div class="filters">
            <div class="filter-group">
                <label class="filter-label">Filter</label>
                <select id="typeFilter" onchange="loadCards()">
                    <option value="">All Types (120+)</option>
                    <option value="examination">Examination (30+)</option>
                    <option value="procedure">Procedure (20+)</option>
                    <option value="interpretation">Interpretation (15+)</option>
                    <option value="history">History (20+)</option>
                    <option value="communication">Communication (15+)</option>
                    <option value="emergency">Emergency (20+)</option>
                </select>
            </div>
        </div>
        <div class="grid" id="cards-container"></div>
    </div>

        <div class="page-header">
            <h1>OSCE Stations</h1>

        <div class="grid" id="stations-container"></div>

        function goHome() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('home').classList.add('active');
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        }
        
        function goCards() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('master-cards').classList.add('active');
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('nav a')[0].classList.add('active');
            loadCards();
        }
        
        function goStations() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('osce').classList.add('active');
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('nav a')[1].classList.add('active');
            loadStations();
        }
        
        function loadCards() {
            const filter = document.getElementById('typeFilter')?.value || '';
            const filtered = filter ? masterCards.filter(c => c.type === filter) : masterCards;
            const html = filtered.map(card => `
                <div class="card" onclick="alert('CH ${card.ch}: ${card.title}\\n\\n${card.desc}')">
                    <div class="card-num">CH ${card.ch}</div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-desc">${card.desc}</div>
                </div>
            `).join('');
            document.getElementById('cards-container').innerHTML = html;
        }
        
        function loadStations() {
            const html = osceStations.map(s => {
                const riskClass = `risk-${s.risk}`;
                const riskText = s.risk === 'instant' ? 'INSTANT FAIL' : s.risk === 'high' ? 'HIGH RISK' : s.risk === 'time' ? 'TIME-CRITICAL' : 'DECISION-BASED';
                return `
                    <div class="station" onclick="alert('${s.id}: ${s.title}\\n\\n${s.desc}')">
                        <div class="station-num">${s.id}</div>
                        <div class="station-title">${s.title}</div>
                        <div class="station-desc">${s.desc}</div>
                        <div class="risk-badge ${riskClass}">${riskText}</div>
                    </div>
                `;
            }).join('');
            document.getElementById('stations-container').innerHTML = html;
        }
        
        loadCards();
        loadStations();
    </script>
</body>
</html>
